    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#f7f8fb" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.72" />
  <rect x="72" y="72" width="1056" height="486" fill="#ffffff" stroke="#d4d4d8" stroke-width="2" />
  <text x="112" y="150" fill="#9b75d9" font-family="monospace" font-size="34" font-weight="700">&gt; ATELIER / ECONOMICS</text>
  <text x="112" y="278" fill="#18181b" font-family="monospace" font-size="66" font-weight="700">HOW ATELIER</text>
  <text x="112" y="355" fill="#18181b" font-family="monospace" font-size="66" font-weight="700">SAVES MONEY</text>
  <text x="112" y="435" fill="#52525b" font-family="monospace" font-size="27">Fewer turns. Smaller reads. Bounded tool output.</text>
