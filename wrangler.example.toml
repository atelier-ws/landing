name = "atelier-landing"
main = "src/worker.ts"
compatibility_date = "2026-06-16"

# Custom domains this Worker serves. BOTH the apex and www must be listed -- www
# was attached via the dashboard while the apex was not, so atelier.ws/api/* (the
# README live badges) 404'd against a stale target. Declaring them here binds
# them reproducibly on `wrangler deploy`.
routes = [
  { pattern = "atelier.ws", custom_domain = true },
  { pattern = "www.atelier.ws", custom_domain = true },
]

[assets]
directory = "./dist"
binding = "ASSETS"
# Serve clean, slash-free URLs (e.g. /pricing) so the served URL matches the
# canonical tag and the sitemap; /pricing/ 301-redirects to /pricing.
html_handling = "drop-trailing-slash"
# The Worker runs first for every request so it can 301 www -> apex (see
# src/worker.ts) and so /api/* reaches the handlers. It still falls through to
# ./dist for static assets, and the `_headers` file is applied to those
# asset responses.
run_worker_first = true

[[d1_databases]]
binding = "TELEMETRY_DB"
database_name = "atelier-public-telemetry"
database_id = "replace-with-cloudflare-d1-database-id"

[[kv_namespaces]]
binding = "METRICS_CACHE"
id = "replace-with-cloudflare-kv-namespace-id"
