# Deploys the landing Cloudflare Worker on every push to main.
name: Deploy landing

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-landing
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Astro static output -> ./dist, uploaded as the Worker's assets.
      - name: Build site
        run: npm run build

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply atelier-telemetry --remote

      - name: Validate deployment inputs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "::error::CLOUDFLARE_API_TOKEN is missing"
            exit 1
          }

          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "::error::CLOUDFLARE_ACCOUNT_ID is missing"
            exit 1
          }

          test -f wrangler.toml || {
            echo "::error::wrangler.toml was not found"
            exit 1
          }

          test -d dist || {
            echo "::error::dist directory was not created"
            exit 1
          }

          npx wrangler whoami

      - name: Check Worker configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.toml --dry-run

      - name: Deploy Worker to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.toml
