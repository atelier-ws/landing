```yaml
# Deploys the landing Cloudflare Worker on every push to main.
name: Deploy landing

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-landing
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Astro static output -> ./dist, uploaded as the Worker's assets.
      - name: Build site
        run: npm run build

      - name: Deploy Worker to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy
```
